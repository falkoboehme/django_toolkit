{% load static %}
<header class="dt-header">
    <div class="dt-header-inner">
        <button
            type="button"
            class="btn btn-outline-secondary dt-sidebar-toggle"
            id="dt-sidebar-toggle"
            aria-label="Toggle sidebar"
            aria-expanded="true"
            aria-controls="dt-sidenav"
            data-icon-expanded="{% static 'django_toolkit/icons/pin.svg' %}"
            data-icon-collapsed="{% static 'django_toolkit/icons/pin-off.svg' %}"
        >
            <img class="dt-sidebar-toggle-icon" src="{% static 'django_toolkit/icons/pin.svg' %}" alt="" aria-hidden="true">
        </button>

        <div class="dt-header-search-wrap">
            {% url 'global-search' as global_search_url %}
            <form class="dt-top-search" method="get" action="{{ global_search_url|default:request.path|default:'/' }}">
                <input
                    type="search"
                    class="form-control dt-top-search-input"
                    name="q"
                    value="{{ request.GET.q|default:'' }}"
                    placeholder="Search"
                    aria-label="Global search"
                >
                <button type="submit" class="btn btn-primary dt-top-search-button" aria-label="Run search">
                    <img class="dt-top-search-icon" src="{% static 'django_toolkit/icons/magnify.svg' %}" alt="" aria-hidden="true">
                </button>
            </form>
        </div>

        <div class="dt-header-spacer"></div>
        <div class="dt-header-profile">
            {% include 'django_toolkit/includes/profile-button.html' %}
        </div>
    </div>
</header>
