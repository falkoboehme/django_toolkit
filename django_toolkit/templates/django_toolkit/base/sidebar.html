{% load static %}


{% for item in menu_items %}
<li class="nav-item">
    {% if item.is_header %}
        <span class="nav-group-label">{{ item.title }}</span>
    {% else %}
        {% if item.url %}
            <a href="{{ item.url }}" class="nav-link">{{ item.title }}</a>
        {% else %}
            <div class="nav-link">{{ item.title }}</div>
        {% endif %}
        {% endif %}
    
    {% if item.button_add %}
        {{ item.button_add }}
    {% endif %}
</li>
{% endfor %}
