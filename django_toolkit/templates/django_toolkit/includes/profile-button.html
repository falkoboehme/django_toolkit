{% load i18n %}

{% if request.user.is_authenticated %}
  <div class="dropdown dt-profile-dropdown">
    <button type="button" aria-expanded="false" data-bs-toggle="dropdown" class="btn btn-outline-secondary dropdown-toggle w-100 dt-profile-btn">
      <i class="mdi mdi-account"></i>
      <span id="navbar_user" class="dt-profile-name">{{ request.user|truncatechars:"30" }}</span>
    </button>
    <ul class="dropdown-menu dropdown-menu-end dt-profile-menu">
    <!--
      <li>
        <button type="button" class="dropdown-item color-mode-toggle">
          <span class="color-mode-text">Dark Mode</span>
        </button>
      </li>
    -->
      <li>
        {% if request.user.is_staff %}
          <a class="dropdown-item" href="{% url 'admin:index' %}">{% trans "Admin Area" %}</a>
        {% endif %}
      </li>
      {% comment %} <li>
        <a class="dropdown-item" href="{% url 'user:profile' %}">Profile</a>
      </li> {% endcomment %}
    <!--
      <li>
        <a class="dropdown-item" href="#">Preferences</a>
      </li>
    -->
      <li><hr class="dropdown-divider" /></li>
      <li>
        <a class="dropdown-item" href="{% url 'logout' %}">{% trans "Logout" %}</a>
      </li>
    </ul>
  </div>
{% else %}
  <div class="btn-group dt-profile-login-group">
    <a class="btn btn-primary ws-nowrap" type="button" href="{% url 'login' %}?next={{ request.path }}">Log In</a>
    <button type="button" class="btn btn-primary dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown">
      <span class="visually-hidden">Toggle Dropdown</span>
    </button>
    <ul class="dropdown-menu dropdown-menu-end">
      <li>
        <button class="dropdown-item color-mode-toggle">
          <i class="color-mode-icon mdi mdi-lightbulb"></i>
          <span class="color-mode-text">Dark Mode</span>
        </button>
      </li>
    </ul>
  </div>
{% endif %}
