{% if row.render_formular and not card.read_only %}
    {# Create a password input field #}
    <input type="password" name="{{ row.name }}" class="form-control" id="{{ row.id }}"
        {% if row.required %}
            required
        {% endif %}
        autocomplete="off"
    >
{% else %}
    {# Just display a message that this is a password field #}
    <output id="{{ row.id }}">
        *****
    </output>
{% endif %}
