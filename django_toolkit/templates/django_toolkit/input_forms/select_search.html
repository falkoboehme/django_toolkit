{% if row.render_formular and not card.read_only %}
    <input
        type="search"
        id="{{ row.id }}_search"
        class="form-control mb-2"
        placeholder="{{ row.select_search_placeholder }}"
        autocomplete="off"
    >

    <select name="{{ row.name }}" id="{{ row.id }}" class="form-control"
        {% if row.multiple %}
            multiple="multiple"
        {% endif %}
        {% if row.size %}
            size="{{ row.size }}"
        {% endif %}
    >
    {% if not row.required and not row.multiple %}
        <option value="">{{ global_none }}</option>
    {% endif %}

    {% for value, display in row.select_data.items %}
        {% if value in row.selected_values %}
            <option value="{{ value }}" selected>{{ display }}</option>
        {% else %}
            <option value="{{ value }}">{{ display }}</option>
        {% endif %}
    {% endfor %}
    </select>

    <script type="text/javascript">
        (function() {
            const searchInput = document.getElementById('{{ row.id|escapejs }}_search');
            const targetSelect = document.getElementById('{{ row.id|escapejs }}');
            const baseUrl = '{{ row.select_search_url|escapejs }}';
            const searchParam = '{{ row.select_search_param|escapejs }}';
            let debounceTimer = null;

            if (!searchInput || !targetSelect || !baseUrl) {
                return;
            }

            function buildUrl(query) {
                const url = new URL(baseUrl, window.location.origin);
                const normalizedQuery = String(query || '').trim();
                if (normalizedQuery) {
                    url.searchParams.set(searchParam, normalizedQuery);
                }
                return url.toString();
            }

            function getSelectedIds() {
                return Array.from(targetSelect.selectedOptions).map(function(option) {
                    return String(option.value);
                });
            }

            function runSearch(query) {
                DependencySelectAjax(buildUrl(query), '{{ row.id|escapejs }}', getSelectedIds());
            }

            searchInput.addEventListener('input', function(event) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(function() {
                    runSearch(event.target.value);
                }, 250);
            });
        })();
    </script>
{% else %}
    {# Just display the value #}
    <output id="{{ row.id }}">
        {% if row.value %}
            {{ row.value }}
        {% else %}
            {{ global_none }}
        {% endif %}
    </output>
{% endif %}
