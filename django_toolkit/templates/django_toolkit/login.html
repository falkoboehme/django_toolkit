{% extends 'django_toolkit/base/layout.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="dt-login-shell">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5 col-xl-4">
            <form class="dt-login-card" method="post">
                <h1 class="dt-login-title">Login</h1>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
